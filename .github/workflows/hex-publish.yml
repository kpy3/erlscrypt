name: Hex Publish

on:
  push:
    tags:
      - "*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Publish to Hex.pm
        uses: erlangpack/github-action@v4
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
